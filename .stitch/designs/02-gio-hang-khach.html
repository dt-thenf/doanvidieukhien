<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#6B8F71",
              "background": "#FAF7F2",
              "surface": "#FAF7F2",
              "on-surface": "#2C2C2C",
              "outline": "#8E8E8E",
              "surface-container": "#F1EDE7"
            },
            "fontFamily": {
              "headline": ["Poppins"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        body {
            background-color: #FAF7F2;
            color: #2C2C2C;
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="font-body selection:bg-primary/10">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#FAF7F2]/95 backdrop-blur-sm flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity flex items-center justify-center active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold text-on-surface">Giỏ hàng</h1>
</div>
<div class="bg-surface-container px-4 py-1.5 rounded-full">
<span class="font-body font-semibold text-on-surface text-sm">Bàn 03</span>
</div>
</header>
<main class="pt-24 pb-48 px-6 max-w-md mx-auto">
<!-- Cart Items List -->
<section class="space-y-8">
<!-- Item 1 -->
<div class="flex gap-4 items-start">
<div class="w-20 h-20 shrink-0 rounded-lg overflow-hidden bg-surface-container">
<img alt="Canh rau củ nấm" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXHYV5NUol7QGOwETEnFdF4rgyEHEt5PZPhHRxGZVkK69N_TZOxlBH6PDVGblQhH9IJFo48dB3dJhnMN_LfcxQ5zaOe3_4mya3bGOEr1JG1_PuwBsGhnB8y4EWFDeT5TJulZ8bBeeC7eT_vFCJYvhCswYi0N1N3H2GwcbBFsOqApag-3RIiklnPtKqCQW0UhmNTIMpsBqMQ0_TqGPuQkh-i-DeRy9PIy6V1jaLR4Ps5w74_YuCjgnmRClJKGXaThpEkcYK4meb1DL-"/>
</div>
<div class="flex-1 flex flex-col justify-between h-20">
<div>
<div class="flex justify-between items-start">
<h3 class="font-headline font-semibold text-on-surface text-sm">Canh rau củ nấm</h3>
<button class="text-outline hover:text-red-600 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<p class="text-on-surface/70 text-sm mt-0.5 tabular-nums">45.000đ</p>
</div>
<div class="flex items-center gap-3">
<button class="w-7 h-7 rounded-full border border-outline/30 flex items-center justify-center text-on-surface active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="font-semibold tabular-nums w-4 text-center text-sm">1</span>
<button class="w-7 h-7 rounded-full border border-outline/30 flex items-center justify-center text-on-surface active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-4 items-start">
<div class="w-20 h-20 shrink-0 rounded-lg overflow-hidden bg-surface-container">
<img alt="Cơm chiên rau củ" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1lNGMhV92SGAhQjjuYpKUF1i9Qj5JqB01T3vr3LUHd0mjosU6Guoj-6ashKl6muwE3eq1DMhvHchwtt_Lt1-jYnsLo3pCtT4W2T-1-saZwcOHzxWqOKj_psj9e2dl8Z6_l-oIeLDmeRfopTZK1smeQpCP1cbt58EpyeJYRmXg4jxjt0SxtDriEsiCrG8S1qjjMrfZD7Rl3TWgjgLxFaHfN4kOi5gPTcgmFoQ0iFj6FVbjMVKvyhW74BJkhKICdX3OALjXx1vdAf99"/>
</div>
<div class="flex-1 flex flex-col justify-between h-20">
<div>
<div class="flex justify-between items-start">
<h3 class="font-headline font-semibold text-on-surface text-sm">Cơm chiên rau củ</h3>
<button class="text-outline hover:text-red-600 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<p class="text-on-surface/70 text-sm mt-0.5 tabular-nums">55.000đ</p>
</div>
<div class="flex items-center gap-3">
<button class="w-7 h-7 rounded-full border border-outline/30 flex items-center justify-center text-on-surface active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="font-semibold tabular-nums w-4 text-center text-sm">1</span>
<button class="w-7 h-7 rounded-full border border-outline/30 flex items-center justify-center text-on-surface active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Divider -->
<div class="my-10 flex justify-center">
<div class="w-12 h-[1px] bg-outline/20"></div>
</div>
<!-- Note Field -->
<section>
<label class="block font-body font-semibold text-sm text-on-surface/80 mb-2 ml-1">Ghi chú cho bếp</label>
<textarea class="w-full bg-white border border-outline/20 focus:border-primary focus:ring-0 rounded-lg p-3 min-h-[80px] text-sm text-on-surface placeholder:text-outline/40 transition-colors font-body" placeholder="Ghi chú cho bếp (không bắt buộc)"></textarea>
</section>
<!-- Totals -->
<section class="mt-12 space-y-2">
<div class="flex justify-between items-center text-on-surface/70 text-sm">
<span>Tạm tính</span>
<span class="tabular-nums">100.000đ</span>
</div>
<div class="flex justify-between items-center text-on-surface/70 text-sm">
<span>Phí phục vụ (0%)</span>
<span class="tabular-nums">0đ</span>
</div>
<div class="pt-4 mt-2 border-t border-outline/10 flex justify-between items-end">
<span class="font-headline font-bold text-base">Tổng cộng</span>
<span class="font-headline font-bold text-xl text-primary tabular-nums">100.000đ</span>
</div>
</section>
</main>
<!-- Bottom Actions -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#FAF7F2] border-t border-outline/10 px-6 pt-4 pb-safe">
<div class="max-w-md mx-auto space-y-3">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-white rounded-lg py-3.5 font-headline font-semibold text-base active:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
<span>Gửi đơn</span>
</button>
<button class="w-full flex items-center justify-center gap-2 text-on-surface/80 py-2 font-body font-medium text-sm hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="add_shopping_cart">add_shopping_cart</span>
<span>Tiếp tục chọn món</span>
</button>
</div>
</nav>
</body></html>
