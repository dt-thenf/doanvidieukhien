<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF7F2;
            -webkit-tap-highlight-color: transparent;
        }
        .font-headline {
            font-family: 'Poppins', sans-serif;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        /* Custom scrollbar suppression for category chips */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#6B8F71",
              "on-primary": "#ffffff",
              "surface": "#FAF7F2",
              "on-surface": "#2D342E",
              "on-surface-variant": "#5F6B5E",
              "surface-container": "#F2EDE4",
              "surface-container-high": "#E8E2D8",
              "outline": "#C4CEC0",
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "full": "9999px"
            }
          },
        },
      }
    </script>
</head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FAF7F2]/90 backdrop-blur-md">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="table_restaurant">table_restaurant</span>
<h1 class="text-base font-semibold text-on-surface font-headline">Bàn 03</h1>
</div>
<div class="flex items-center">
<span class="text-xs font-medium text-primary bg-primary/10 px-3 py-1 rounded-full border border-primary/20">Đang gọi món</span>
</div>
</div>
<div class="bg-outline/20 h-[1px] w-full absolute bottom-0"></div>
</header>
<main class="pt-20 pb-32 max-w-md mx-auto px-6">
<!-- Category Chips -->
<div class="flex overflow-x-auto no-scrollbar gap-2 mb-8 -mx-6 px-6">
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-medium transition-all">Khai vị chay</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium transition-colors">Món nóng</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium transition-colors">Cơm — phần ăn</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium transition-colors">Bún — miến</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium transition-colors">Đồ uống</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium transition-colors">Tráng miệng chay</button>
</div>
<!-- Section Hero -->
<div class="mb-8">
<h2 class="text-2xl font-headline font-semibold text-on-surface tracking-tight">Hôm nay bếp có</h2>
<p class="text-on-surface-variant text-sm mt-1 opacity-90">Nguyên liệu thuần tự nhiên, chế biến trong ngày.</p>
</div>
<!-- Food List -->
<div class="space-y-10">
<!-- Food Card 1 -->

</div>
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="text-lg font-headline font-semibold text-on-surface">Đậu hũ chiên sả ớt</h3>
<div class="flex gap-2">
<span class="text-[10px] uppercase tracking-wide font-bold text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded">Thuần chay</span>
</div>
<p class="text-base font-medium tabular-nums text-primary mt-1">45.000đ</p>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Food Card 2 -->
<div class="flex flex-col gap-3">
<div class="relative overflow-hidden rounded-2xl aspect-[4/3] bg-surface-container">
<img alt="Gỏi ngó sen tôm thịt chay" class="w-full h-full object-cover" data-alt="Vietnamese lotus root salad with tofu and herbs, vibrant fresh vegetables in a clay bowl, natural daylight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAo_sNjagSAWQ01Qp8fzzhUdAqs8KkGAHXyjOap9F79apDEJ7T-SEL2wZyO0zohK6qw9DudbLb-1NBVcINORS_pjbQr5NiNSFGb1owhO1qtpstPiWjMsiWqyYVD_brvpPXsf8GWUVYojhlZBWNmeLSMMOwhOFURgWfwuJNOJ-mr9MLwAN2Y7c5AFWHhyH-l7T4MWOUkXcYns03yrQqdki8QayowbiagtI49CcXj1IhF9oX6frn4G7BXuryBWS0YYs7lJAtWkyBP3WMC"/>
</div>
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="text-lg font-headline font-semibold text-on-surface">Gỏi ngó sen chay</h3>
<div class="flex gap-2">
<span class="text-[10px] uppercase tracking-wide font-bold text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded">Thanh mát</span>
</div>
<p class="text-base font-medium tabular-nums text-primary mt-1">55.000đ</p>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Food Card 3 -->
<div class="flex flex-col gap-3">
<div class="relative overflow-hidden rounded-2xl aspect-[4/3] bg-surface-container">
<img alt="Nấm kho tiêu" class="w-full h-full object-cover" data-alt="Braised mushrooms with black pepper in a traditional clay pot, authentic Vietnamese vegetarian cooking, soft lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqb6QKLGHgnUeNXLabNnJY5W_rggbc9wM_1P4Z9doFi0OiJHGfB75PNF7tMTUC7LX3o9Bi232Vtv-ecHpHZUHcrQ-5F6M0zTvwVTJhwKPpDs0Om_CtaqaaKB5C5tFB5xMmdTxCFN-Y9-bm8iw6a1b-h0MC7LOSloKtsDKiw9164__hsOkNYsiS4NZhM_4jlivQBuAV83gf6CduaQWZDrdvQFjXkl0OTaW4cOLHUipWyTsXJZzflrzwPD8FP8Elt_2TS3OeDjkWl44w"/>
</div>
<div class="flex justify-between items-start">
<div class="space-y-1">
<h3 class="text-lg font-headline font-semibold text-on-surface">Nấm kho tiêu</h3>
<div class="flex gap-2">
<span class="text-[10px] uppercase tracking-wide font-bold text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded">Đậm đà</span>
</div>
<p class="text-base font-medium tabular-nums text-primary mt-1">65.000đ</p>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50 flex items-center h-14 bg-primary rounded-2xl shadow-lg shadow-primary/20 overflow-hidden transition-transform active:scale-[0.98]">
<div class="flex items-center justify-between w-full px-6 py-4 text-white">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white" data-icon="shopping_basket">shopping_basket</span>
<span class="font-medium text-sm">Xem giỏ hàng</span>
</div>
<div class="flex items-center gap-1">
<span class="font-medium tabular-nums text-sm">1.250.000đ</span>
<span class="material-symbols-outlined text-white text-lg" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</nav>
</body></html>
